app-id: fm.reaper.Reaper
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
tags:
  - proprietary
command: reaper

finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=pulseaudio
  - --filesystem=xdg-run/pipewire-0
  - --device=all
  - --filesystem=home

add-extensions:
  org.freedesktop.LinuxAudio.Plugins:
    directory: extensions/Plugins
    version: '24.08'
    add-ld-path: lib
    merge-dirs: lv2;clap;vst;vst3
    subdirectories: true
    no-autodownload: true

modules:
  - name: libxml2
    config-opts:
      - --without-python
    sources:
      - type: archive
        url: https://download.gnome.org/sources/libxml2/2.13/libxml2-2.13.9.tar.xz
        sha256: a2c9ae7b770da34860050c309f903221c67830c86e4a7e760692b803df95143a
        x-checker-data:
          type: anitya
          project-id: 5552
          stable-only: true
          url-template: https://download.gnome.org/sources/libxml2/2.13/libxml2-$version.tar.xz

  - name: reaper
    buildsystem: simple
    build-commands:
      # Install script to extract tarball
      - install -D apply_extra /app/bin/apply_extra
      # Install wrapper script to run application
      - install -D reaper /app/bin/reaper
      # Add icon
      - install -Dm644 main.png /app/share/icons/hicolor/256x256/apps/${FLATPAK_ID}.png
      # Add desktop integration
      - install -Dm644 fm.reaper.Reaper.desktop /app/share/applications/${FLATPAK_ID}.desktop
      # Install flatpak metadata
      - install -Dm644 fm.reaper.Reaper.metainfo.xml /app/share/metainfo/${FLATPAK_ID}.metainfo.xml
      # extensions
      - install -d /app/extensions/Plugins
      - install -d /app/lib/ffmpeg
    sources:
      - type: script
        dest-filename: apply_extra
        commands:
          # Extract downnloaded tarball
          - mkdir -p export/share
          - tar xf reaper.tar.xz -C /app/extra/export/share
          - rm -f reaper.tar.xz
          # Run installer script
          - cd export/share/reaper_linux_*
          - ./install-reaper.sh --quiet --install /app/extra
          # Clean up temp tiles
          - cd ../../../
          - rm -rf /app/extra/export/share/reaper_linux_*
      - type: extra-data
        filename: reaper.tar.xz

        url: https://www.reaper.fm/files/7.x/reaper778_linux_x86_64.tar.xz
        sha256: d662eb35dcab7fd2ce5fac6a60921362ef033e2d075c74ccef974fbbd13a6542
        size: 13610812
        only-arches: [x86_64]

        x-checker-data:
          type: html
          url: https://www.reaper.fm/download.php
          version-pattern: "<div class='hdrbottom'>Version ([\\d\\.-]*):"
          url-template: https://www.reaper.fm/files/7.x/reaper${major}${minor}_linux_x86_64.tar.xz

      - type: extra-data
        filename: reaper.tar.xz
        url: https://www.reaper.fm/files/7.x/reaper778_linux_aarch64.tar.xz
        sha256: c6accf3789da4986af7989453a42b3a1c9dfcac31fcda5245a774b7a5e23007c
        size: 12237660
        only-arches: [aarch64]

        x-checker-data:
          type: html
          url: https://www.reaper.fm/download.php
          version-pattern: "<div class='hdrbottom'>Version ([\\d\\.-]*):"
          url-template: https://www.reaper.fm/files/7.x/reaper${major}${minor}_linux_aarch64.tar.xz

      - type: script
        dest-filename: reaper
        commands:
          - /app/extra/REAPER/reaper
      - type: file
        path: fm.reaper.Reaper.desktop
      - type: file
        path: fm.reaper.Reaper.metainfo.xml
      - type: file
        path: main.png
